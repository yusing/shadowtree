name = "Shadowtree TOML"
grammar = "toml"
path_suffixes = [
    ".shadowtree.toml",
    "shadowtree.toml",
]
line_comments = ["# "]
autoclose_before = ",]}"
word_characters = ["_", "-", "@"]
brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["comment", "string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["comment", "string"] },
]

[overrides.string]
completion_query_characters = ["{", "@", "_", "-"]

# Open this file in your editor to test Shadowtree LSP behavior for recipe-local
# profiles. The filename intentionally ends with .shadowtree.toml so editor
# schema bindings recognize it as a Shadowtree config.

[recipes.benchmark]
help = "Run a benchmark with tunable load defaults."
cmd = '''
printf 'connections=%s requests=%s runs=%s streams=%s\n' \
  "{connections}" "{requests}" "{runs}" "{streams}"
'''

[recipes.benchmark.arguments.connections]
help = "Concurrent TCP connections."
type = "int"
default = 32

[recipes.benchmark.arguments.requests]
help = "Total requests per run."
type = "int"
default = 1000

[recipes.benchmark.arguments.runs]
help = "Benchmark repetitions."
type = "int"
default = 1

[recipes.benchmark.arguments.streams]
help = "HTTP/2 streams per connection."
type = "int"
default = 1

[recipes.benchmark.profiles.smoke.arguments]
connections = 8
requests = 500
runs = 1

[recipes.benchmark.profiles.stable.arguments]
connections = 64
requests = 20000
runs = 5

[recipes.benchmark.profiles.stress.arguments]
connections = 100
streams = 100
requests = 50000

[recipes.check-benchmark]
help = "Exercise profile completion and diagnostics in recipe references."
cmd = "@benchmark[profile=stable,runs=2]"

# LSP checks to try:
# - In the command above, put the cursor after profile= and request completion.
#   You should see smoke, stable, and stress.
# - Add a new table header:
#     [recipes.benchmark.profiles.<TAB>
#   You should see smoke, stable, and stress.
# - Add a new key inside a profile arguments table and request completion.
#   You should see connections, requests, runs, and streams.
# - Uncomment this line to verify diagnostics for unknown profiles:
# cmd = "@benchmark[profile=missing]"

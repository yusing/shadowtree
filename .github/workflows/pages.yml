name: Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        if: ${{ env.ACT != 'true' }}
        uses: actions/configure-pages@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          profile: minimal

      - name: Install mdBook
        run: cargo +stable install mdbook --version '^0.5' --locked

      - name: Build site
        run: mdbook build docs

      - name: Upload Pages artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/book

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

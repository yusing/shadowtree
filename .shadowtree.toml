profile = "go"
shell = "sh"

[recipes.build]
help = "Build the shadowtree binary into bin/."
cmd = ["go", "build"]
args = [ "-ldflags=-s -w", "-buildvcs=false", "-o", "bin/{binary}"]
default_args = ["{project}"]
sync_out = ["bin/{binary}"]

[recipes.build.arguments.project]
help = "Go package to build."
type = "rel_path"
path_kind = "dir"
position = 1
default = "./cmd/shadowtree"

[recipes.build.arguments.binary]
help = "Output binary name under bin/."
type = "string"
default = "shadowtree"

[recipes.install]
help = "Install the Shadowtree CLI and language server."
sandboxed = false
cmd = '''
set -eu
prefix=${PREFIX:-"$HOME/.local"}
bindir=${BINDIR:-"$prefix/bin"}
destdir=${DESTDIR:-}
install_bin="$destdir$bindir"
mkdir -p "$install_bin"
GOBIN="$install_bin" go install ./cmd/shadowtree ./cmd/shadowtree-lsp
'''
post = ['''
set -eu
prefix=${PREFIX:-"$HOME/.local"}
bindir=${BINDIR:-"$prefix/bin"}
destdir=${DESTDIR:-}
shadowtree_bin="$destdir$bindir/shadowtree"
if fish -v >/dev/null 2>&1; then
	fish_config_dir=${FISH_CONFIG_DIR:-"$HOME/.config/fish"}
	fish_completions_dir=${FISH_COMPLETIONS_DIR:-"$fish_config_dir/completions"}
	mkdir -p "$fish_completions_dir"
	"$shadowtree_bin" completion fish > "$fish_completions_dir/shadowtree.fish"
fi
config_home=${XDG_CONFIG_HOME:-"$HOME/.config"}
bash_completion_file="$config_home/shadowtree/completion.bash"
mkdir -p "$(dirname "$bash_completion_file")"
"$shadowtree_bin" completion bash > "$bash_completion_file"
bashrc=${BASHRC:-"$HOME/.bashrc"}
marker="# shadowtree bash completion"
if ! grep -Fqs "$marker" "$bashrc" 2>/dev/null; then
	mkdir -p "$(dirname "$bashrc")"
	cat >> "$bashrc" <<'EOF'

# shadowtree bash completion
if [ -n "${XDG_CONFIG_HOME:-}" ]; then
	_shadowtree_completion="$XDG_CONFIG_HOME/shadowtree/completion.bash"
else
	_shadowtree_completion="$HOME/.config/shadowtree/completion.bash"
fi
[ -r "$_shadowtree_completion" ] && . "$_shadowtree_completion"
unset _shadowtree_completion
EOF
fi
''']

[recipes.install-skill]
help = "Install the Shadowtree agent skill."
cmd = '''
set -eu
skill_src=.agents/skills/shadowtree
skill_dest=${AGENTS_SKILLS_DIR:-"$HOME/.agents/skills"}/shadowtree

if [ ! -f "$skill_src/SKILL.md" ]; then
	echo "missing skill source: $skill_src" >&2
	exit 1
fi

rm -rf "$skill_dest"
mkdir -p "$(dirname "$skill_dest")"
cp -R "$skill_src" "$skill_dest"
echo "installed shadowtree skill to $skill_dest"
'''


profile = "go"
shell = "sh"

[recipes.build]
help = "Build the shadowtree binary into bin/."
cmd = "go build -ldflags='-s -w' -buildvcs=false -o bin/{binary} {project} {@}"
sync_out = ["bin/{binary}"]

[recipes.build.arguments.project]
help = "Go package to build."
type = "rel_path"
path_kind = "dir"
position = 1
default = "./cmd/shadowtree"

[recipes.build.arguments.binary]
help = "Output binary name under bin/."
type = "string"
default = "shadowtree"

[recipes.install]
help = "Install the Shadowtree CLI and language server."
sandboxed = false
cmd = "go install ./cmd/shadowtree ./cmd/shadowtree-lsp"
post = ['''
set -eu
go_bin=$(go env GOBIN)
if [ -z "$go_bin" ]; then
	go_bin="$(go env GOPATH)/bin"
fi
PATH="$go_bin:$PATH"
export PATH

if command -v fish >/dev/null 2>&1; then
	fish_config_dir=${FISH_CONFIG_DIR:-"$HOME/.config/fish"}
	fish_completions_dir=${FISH_COMPLETIONS_DIR:-"$fish_config_dir/completions"}
	mkdir -p "$fish_completions_dir"
	shadowtree completion fish > "$fish_completions_dir/shadowtree.fish"
fi
if command -v zsh >/dev/null 2>&1; then
	zshrc=${ZSHRC:-"$HOME/.zshrc"}
	zsh_completion_line='command -v shadowtree >/dev/null 2>&1 && eval "$(shadowtree completion zsh)"'
	if ! grep -Fqs "$zsh_completion_line" "$zshrc" 2>/dev/null; then
		mkdir -p "$(dirname "$zshrc")"
		printf '%s\n' "$zsh_completion_line" >> "$zshrc"
	fi
fi
bashrc=${BASHRC:-"$HOME/.bashrc"}
bash_completion_line='command -v shadowtree >/dev/null 2>&1 && eval "$(shadowtree completion bash)"'
if ! grep -Fqs "$bash_completion_line" "$bashrc" 2>/dev/null; then
	mkdir -p "$(dirname "$bashrc")"
	printf '%s\n' "$bash_completion_line" >> "$bashrc"
fi
''']

[recipes.install-skill]
help = "Install local agent skills."
cmd = '''
set -eu
skills_src=.agents/skills
skills_dest=${AGENTS_SKILLS_DIR:-"$HOME/.agents/skills"}

if [ ! -d "$skills_src" ]; then
	echo "missing skills source: $skills_src" >&2
	exit 1
fi

installed=0
for skill_src in "$skills_src"/*; do
	if [ ! -f "$skill_src/SKILL.md" ]; then
		continue
	fi

	skill_name=$(basename "$skill_src")
	skill_dest=$skills_dest/$skill_name
	rm -rf "$skill_dest"
	mkdir -p "$skills_dest"
	cp -R "$skill_src" "$skill_dest"
	echo "installed $skill_name skill to $skill_dest"
	installed=$((installed + 1))
done

if [ "$installed" -eq 0 ]; then
	echo "no skills found in $skills_src" >&2
	exit 1
fi
'''

